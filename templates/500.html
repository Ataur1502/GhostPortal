{% extends 'base.html' %}

{% block title %}500 - Internal Server Error{% endblock %}

{% block content %}
<div class="row justify-content-center text-center">
    <div class="col-md-8 col-lg-6">
        <div class="portal-card bg-navy-dark text-light p-5 border-secondary rounded shadow">
            <h1 class="display-1 font-outfit fw-bold text-danger mb-3">500</h1>
            <h3 class="font-outfit fw-bold mb-4">INTERNAL ERROR</h3>
            <p class="text-secondary mb-4">
                An internal server error occurred while processing your request. The issue has been logged, and security administrators have been notified.
            </p>
            <a href="{% url 'landing' %}" class="btn btn-accent px-4 py-2 font-outfit fw-bold">Return Home</a>
        </div>
    </div>
</div>
{% endblock %}
