{% extends 'base.html' %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="row justify-content-center text-center">
    <div class="col-md-8 col-lg-6">
        <div class="portal-card bg-navy-dark text-light p-5 border-secondary rounded shadow">
            <h1 class="display-1 font-outfit fw-bold text-accent mb-3">404</h1>
            <h3 class="font-outfit fw-bold mb-4">RESOURCE NOT FOUND</h3>
            <p class="text-secondary mb-4">
                The requested URL or resource was not found on this secure server. It may have been moved, deleted, or is temporarily unavailable.
            </p>
            <a href="{% url 'landing' %}" class="btn btn-accent px-4 py-2 font-outfit fw-bold">Return Home</a>
        </div>
    </div>
</div>
{% endblock %}
