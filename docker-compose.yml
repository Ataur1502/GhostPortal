services:
  web:
    build:
      context: .
    container_name: ghostportal-web
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000 --insecure"
    restart: unless-stopped
